<!DOCTYPE html>
<html lang="en" class="no-scrollbar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | Club of Competition</title>
    
    <!-- Google Fonts: Poppins & Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                        manrope: ['Manrope', 'sans-serif']
                    },
                    colors: {
                        primary: '#4f46e5',
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        };
    </script>

    <style>
        :root {
            --bg-body: #f8fafc;
            --bg-card: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
        }
        
        * { box-sizing: border-box; -ms-overflow-style: none; scrollbar-width: none; }
        *::-webkit-scrollbar { display: none; }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--bg-body);
            margin: 0; 
            padding: 20px; 
            color: var(--text-main); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        .hero-pattern {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2;
            background-color: var(--bg-body);
            background-image: radial-gradient(#e0e7ff 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .app-container { 
            background: var(--bg-card); 
            backdrop-filter: blur(12px);
            padding: 50px 30px; 
            border-radius: 2.5rem; 
            max-width: 500px; 
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.15); 
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 640px) {
            .app-container {
                padding: 40px 20px;
                border-radius: 2rem;
            }
        }
    </style>
</head>
<body>

<!-- Animated Background Blobs -->
<div class="hero-pattern"></div>
<div class="fixed -top-10 -left-10 w-64 h-64 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-float" style="z-index: -1;"></div>
<div class="fixed -bottom-10 -right-10 w-64 h-64 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-float" style="z-index: -1; animation-delay: 1.5s;"></div>

<div class="app-container">
    <!-- Icon -->
    <div class="inline-flex items-center justify-center p-4 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-2xl mb-6 shadow-lg shadow-indigo-200 animate-float">
        <i class="fas fa-map-signs text-4xl text-white"></i>
    </div>
    
    <!-- 404 Text -->
    <h1 class="text-7xl sm:text-8xl font-poppins font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2 tracking-tighter">404</h1>
    <h2 class="text-2xl sm:text-3xl font-poppins font-extrabold text-slate-800 mb-4 tracking-tight">Off the Career Path!</h2>
    
    <!-- Description -->
    <p class="text-slate-500 font-semibold text-base sm:text-lg leading-relaxed mb-8">
        Oops! It looks like you've wandered into uncharted territory. The page you are looking for doesn't exist or has been moved.
    </p>
    
    <!-- Return Action -->
    <a href="index.html" class="inline-flex items-center justify-center gap-2 w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white rounded-xl font-extrabold text-lg shadow-[0_10px_25px_-5px_rgba(79,70,229,0.4)] hover:bg-indigo-700 active:scale-95 transition-all font-manrope">
        <i class="fas fa-home text-base"></i> Back to Main Test
    </a>
</div>

</body>
</html>
